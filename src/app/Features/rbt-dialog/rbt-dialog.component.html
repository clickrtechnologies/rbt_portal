<div class="spotify-popup">

  <button class="close-btn" (click)="close()">✕</button>

  <div class="song-info">
    <h2>{{ data?.name }}</h2>
    <p>{{ data?.artist }}</p>
  </div>

  <div class="card">

    <div class="label">Subscription plan</div>

    <div class="price">100zar</div>
    <div class="validity">Valid for 30 Days</div>

    <div class="divider"></div>

    <select [(ngModel)]="selectedPack">
      <option value="">Select Plan</option>
      <option value="daily">Daily</option>
      <option value="weekly">Weekly</option>
      <option value="monthly">Monthly</option>
    </select>


    <button (click)="activate()" [disabled]="!selectedPack">
      ACTIVATE RBT
    </button>

  </div>

</div>
