<div class="rbt-container">

  <button class="close-btn" (click)="goBack()">✖</button>

  <div class="rbt-box">

    <div *ngIf="isExistingUser">
      <p>Subscription Cost: 100 ZAR</p>
      <p>Validity: 30 Days</p>
    </div>

    <div class="player-box">
      <button class="control-btn" (click)="prevSong()">⏮</button>

      <button class="play-btn" (click)="togglePlay()">
        <span *ngIf="!isPlaying">▶</span>
        <span *ngIf="isPlaying">⏸</span>
      </button>

      <button class="control-btn" (click)="nextSong()">⏭</button>
    </div>
    <div class="progress-wrapper">
      <input type="range"
             min="0"
             [max]="duration"
             [value]="currentTime"
             (input)="seek($event)"
             class="slider" />
    </div>

  
    <div class="time-box">
      <span>{{ formatTime(currentTime) }}</span>
      <span>{{ formatTime(duration) }}</span>
    </div>
    <div class="extra-controls">
      <button class="small-btn" (click)="toggleRepeat()">
        {{ isRepeat ? '🔁 ON' : '🔁' }}
      </button>

      <button class="small-btn" (click)="toggleShuffle()">
        {{ isShuffle ? '🔀 ON' : '🔀' }}
      </button>

      <button class="small-btn" (click)="toggleFavorite()">
        {{ isFavorite ? '❤️' : '🤍' }}
      </button>
    </div>

  
    <div class="section">
      <h3>LISTEN PREVIEW</h3>

      <button class="listen-btn" (click)="togglePlay()">
        {{ isPlaying ? 'PAUSE' : 'PLAY' }}
      </button>
    </div>


    <div class="price">
      <h3>100 ZAR</h3>
      <p>Validity: 30 Days</p>
    </div>

    <div class="pack-box">
      <label>Select Subscription Pack</label>

      <select (change)="selectPack($event)">
        <option value="">Choose Pack</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>


    <button class="activate-btn" (click)="activateRbt()">
      ACTIVATE RBT
    </button>
    <div class="song-list">

      <div *ngFor="let song of songs" class="song-item">

  <div style="color:red; font-size:30px;">
    TEST ICON
  </div>

  <div class="song-name">
    {{ song.name }}
  </div>

  <button class="set-rbt-btn" (click)="setRbt(song)">
    Set RBT
  </button>

</div>

    </div>

  </div>
</div>
